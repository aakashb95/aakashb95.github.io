actions:
  - name: deploy-site
    label: Deploy site
    workflow: deploy.yml
    ref: master
    cancelable: false
    confirm:
      title: Deploy site?
      message: Build and publish the latest content from master.
      button: Deploy

media:
  - name: images
    label: Images
    input: public/img
    output: /img
    categories: [image]
    extensions: [jpg, jpeg, png, webp, avif, gif]
    rename: safe

content:
  - name: uses
    label: Uses
    type: file
    path: src/content/pages/uses.md
    format: yaml-frontmatter
    operations:
      delete: false
    fields:
      - name: title
        label: Page title
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: body
        label: Content
        type: rich-text
        required: true
        options:
          media: false

  - name: posts
    label: Writing
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{primary}.md"
      field: create
    view:
      primary: title
      fields: [title, date, draft, featured]
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Summary
        type: text
        required: true
      - name: date
        label: Published at
        type: date
        required: true
        options:
          time: true
      - name: tags
        label: Tags
        type: string
        list: true
      - name: draft
        label: Draft
        type: boolean
      - name: featured
        label: Feature on home
        type: boolean
      - name: cover
        label: Social image
        type: image
        options:
          media: images
      - name: body
        label: Post
        type: rich-text
        required: true
        options:
          media: images
          path: blog
          rename: safe

  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    format: yaml-frontmatter
    filename:
      template: "{primary}.md"
      field: create
    view:
      primary: title
      fields: [title, status, featured, importance]
      sort: [importance, title]
      default:
        sort: importance
        order: asc
    fields:
      - name: title
        label: Project name
        type: string
        required: true
      - name: description
        label: One-line pitch
        type: text
        required: true
      - name: img
        label: Cover image
        type: image
        required: true
        options:
          media: images
      - name: category
        label: Category
        type: string
        required: true
      - name: status
        label: Status
        type: select
        required: true
        options:
          values: [live, experiment, archived, decommissioned]
      - name: importance
        label: Sort order
        type: number
        required: true
      - name: featured
        label: Feature on home
        type: boolean
      - name: live_url
        label: Live URL
        type: string
      - name: source_url
        label: Source URL
        type: string
      - name: body
        label: Case study
        type: rich-text
        required: true
        options:
          media: images
          path: projects
          rename: safe

settings:
  content:
    merge: deep
  commit:
    identity: user
    templates:
      create: "content: create {collection} {filename}"
      update: "content: update {collection} {filename}"
      delete: "content: remove {collection} {filename}"
